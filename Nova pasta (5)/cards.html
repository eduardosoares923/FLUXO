<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa | Meus Cartões</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>try { const theme = JSON.parse(localStorage.getItem('fluxoPro_theme')); if (theme) document.documentElement.setAttribute('data-theme', theme); } catch(e){}</script>
</head>
<body>

    <div class="dashboard-layout">
                        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-wallet"></i>
                    <span>FluxoPro</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item ">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="transactions.html" class="nav-item ">
                    <i class="fa-solid fa-money-bill-transfer"></i> Lançamentos
                </a>
                <a href="cards.html" class="nav-item active">
                    <i class="fa-solid fa-credit-card"></i> Cartões
                </a>
                <a href="accounts.html" class="nav-item ">
                    <i class="fa-solid fa-users"></i> Contas & Perfis
                </a>
                <a href="reports.html" class="nav-item ">
                    <i class="fa-solid fa-chart-line"></i> Relatórios
                </a>
                <a href="users.html" class="nav-item " id="navUsers" data-requires-role="admin">
                    <i class="fa-solid fa-user-shield"></i> Usuários
                </a>
                <a href="settings.html" class="nav-item ">
                    <i class="fa-solid fa-gear"></i> Configurações
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
                                    <!-- Header -->
            <header class="top-header">
                <div class="header-title">Gestão de Cartões</div>
                <div class="header-actions">
                    
                    <button id="themeToggle" class="btn btn-icon">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    
                    <div class="user-profile-dropdown" style="position: relative;">
                        <div class="user-profile" id="userProfileBtn">
                            <div class="user-info">
                                <div class="user-name" id="userName">Usuário</div>
                                <div class="user-role" id="userRoleTitle">Administrador</div>
                            </div>
                            <img src="" alt="Avatar" class="user-avatar" id="userAvatar">
                        </div>
                        <div class="dropdown-menu glass-panel" id="userDropdown">
                            <a href="#profile" class="dropdown-item"><i class="fa-solid fa-user"></i> Meu Perfil</a>
                            <a href="#password" class="dropdown-item"><i class="fa-solid fa-key"></i> Alterar Senha</a>
                            <a href="#" id="logoutBtn" class="dropdown-item"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-container">
                <div class="section-header">
                    <h2 class="section-title">Gerenciar Cartões de Crédito</h2>
                </div>

                <div class="cards-grid" id="cardsContainer">
                    <!-- Cards inseridos via JS -->
                    
                    <!-- Botão de Adicionar sempre no final -->
                    <div class="add-card-wrapper" id="btnNovoCartao">
                        <i class="fa-solid fa-circle-plus"></i>
                        <span>Adicionar Novo Cartão</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Novo Cartão -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Novo Cartão de Crédito</h3>
                <button class="modal-close" id="closeCardModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="cardForm">
                <input type="hidden" id="editCardId" value="">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Nome/Apelido do Cartão</label>
                        <input type="text" class="form-control" id="cardName" placeholder="Ex: Nubank, Black" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bandeira</label>
                        <select class="form-control" id="cardBrand" required>
                            <option value="Mastercard">Mastercard</option>
                            <option value="Visa">Visa</option>
                            <option value="Elo">Elo</option>
                            <option value="American Express">American Express</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Nome Impresso no Cartão</label>
                    <input type="text" class="form-control" id="cardHolder" placeholder="Ex: JOAO S SILVA" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Limite Total (R$)</label>
                        <input type="number" step="0.01" class="form-control" id="cardLimit" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cor Principal</label>
                        <input type="color" class="form-control" id="cardColor" value="#8A05BE" style="padding: 0.2rem; height: 3rem;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Dia do Fechamento</label>
                        <input type="number" min="1" max="31" class="form-control" id="cardCloseDay" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Dia do Vencimento</label>
                        <input type="number" min="1" max="31" class="form-control" id="cardDueDay" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem;">Salvar Cartão</button>
            </form>
        </div>
    </div>

    <!-- Modal Fatura do Cartão -->
    <div class="modal-overlay" id="invoiceModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="invoiceModalTitle">Fatura do Cartão</h3>
                <button class="modal-close" id="closeInvoiceModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="invoice-list-container" style="margin-top: 1rem;">
                <!-- Reusing dashboard transaction list styles -->
                <div class="transaction-list" id="invoiceTransactionList">
                    <!-- Transactions inserted via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cards.js"></script>
</body>
</html>
